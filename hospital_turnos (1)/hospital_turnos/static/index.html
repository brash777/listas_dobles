<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital DoubleLink — Sistema de Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0A0E1A;
  --surface:    #111827;
  --surface2:   #1a2235;
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.13);
  --text:       #F1F5F9;
  --muted:      #94A3B8;
  --muted2:     #64748B;
  --accent:     #38BDF8;
  --accent-dim: rgba(56,189,248,0.12);
  --success:    #34D399;
  --danger:     #F87171;
  --warn:       #FBBF24;
  --radius:     12px;
  --radius-sm:  8px;
  --mono:       'DM Mono', monospace;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── Layout ── */
.app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky; top: 0; z-index: 100;
}

.logo {
  display: flex; align-items: center; gap: 12px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #38BDF8, #818CF8);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
.logo-sub  { font-size: 11px; color: var(--muted); font-family: var(--mono); }

.header-right { display: flex; align-items: center; gap: 16px; }
.badge-live {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--success); font-family: var(--mono);
}
.dot-live {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; } 50% { opacity: 0.4; }
}

/* ── Main Content ── */
main {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0;
  height: calc(100vh - 64px);
  overflow: hidden;
}

/* ── Left Panel ── */
.panel-left {
  background: var(--surface);
  border-right: 1px solid var(--border2);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.panel-section {
  padding: 20px 20px 0;
}
.panel-section:last-child { padding-bottom: 20px; }

.section-title {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted2); margin-bottom: 14px;
}

/* Stats Row */
.stats-row {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  text-align: center;
}
.stat-card .val {
  font-size: 22px; font-weight: 600; font-family: var(--mono);
  color: var(--accent); line-height: 1;
}
.stat-card .lbl {
  font-size: 10px; color: var(--muted); margin-top: 4px;
  text-transform: uppercase; letter-spacing: 0.05em;
}

/* Form */
.form-grid { display: flex; flex-direction: column; gap: 10px; }

label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }

input, select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted2); }
select option { background: #1a2235; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.urgente-toggle {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  cursor: pointer; user-select: none;
  transition: border-color 0.2s;
}
.urgente-toggle:hover { border-color: var(--danger); }
.urgente-toggle.active { border-color: var(--danger); background: rgba(248,113,113,0.08); }
.urgente-toggle input[type="checkbox"] { display: none; }
.toggle-dot {
  width: 32px; height: 18px; border-radius: 9px;
  background: var(--border2); position: relative; transition: background 0.2s;
  flex-shrink: 0;
}
.urgente-toggle.active .toggle-dot { background: var(--danger); }
.toggle-dot::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: white; transition: transform 0.2s;
}
.urgente-toggle.active .toggle-dot::after { transform: translateX(14px); }
.toggle-label { font-size: 13px; }
.toggle-sub   { font-size: 11px; color: var(--muted); }

.btn {
  width: 100%; padding: 11px;
  border-radius: var(--radius-sm);
  border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  transition: all 0.2s; letter-spacing: 0.01em;
}
.btn-primary {
  background: var(--accent);
  color: #0A0E1A;
}
.btn-primary:hover { background: #7DD3FC; transform: translateY(-1px); }
.btn-danger {
  background: rgba(248,113,113,0.15);
  color: var(--danger);
  border: 1px solid rgba(248,113,113,0.3);
}
.btn-danger:hover { background: rgba(248,113,113,0.25); }

.btn-group { display: flex; gap: 8px; margin-top: 4px; }
.btn-group .btn { padding: 9px; font-size: 13px; }

.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Search */
.search-box {
  display: flex; gap: 8px;
}
.search-box input { flex: 1; }
.search-box button {
  padding: 9px 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--muted);
  cursor: pointer; font-size: 16px;
  transition: all 0.2s;
}
.search-box button:hover { border-color: var(--accent); color: var(--accent); }

.search-result {
  margin-top: 10px; padding: 12px;
  background: var(--surface2); border-radius: var(--radius-sm);
  border: 1px solid var(--border); font-size: 13px;
  display: none;
}
.search-result.visible { display: block; }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s cubic-bezier(.175,.885,.32,1.275);
  z-index: 999; max-width: 320px;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.ok   { border-color: rgba(52,211,153,0.4); color: var(--success); }
#toast.err  { border-color: rgba(248,113,113,0.4); color: var(--danger);  }
#toast.info { border-color: rgba(56,189,248,0.4); color: var(--accent);   }

/* ── Right Panel ── */
.panel-right {
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
}

.queue-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.queue-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.queue-meta  { font-size: 13px; color: var(--muted); font-family: var(--mono); }

.view-toggle {
  display: flex; background: var(--surface); border-radius: var(--radius-sm);
  padding: 3px; border: 1px solid var(--border);
}
.view-btn {
  padding: 5px 14px; border-radius: 6px; border: none;
  background: transparent; color: var(--muted);
  font-size: 12px; font-family: 'DM Sans',sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.view-btn.active { background: var(--surface2); color: var(--text); }

/* Queue List */
.queue-scroll { flex: 1; overflow-y: auto; padding: 16px 24px; }
.queue-scroll::-webkit-scrollbar { width: 4px; }
.queue-scroll::-webkit-scrollbar-track { background: transparent; }
.queue-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.queue-empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted2);
}
.queue-empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
.queue-empty p { font-size: 14px; }

/* Patient Card */
.patient-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  transition: all 0.25s;
  position: relative; overflow: hidden;
  animation: slideIn 0.3s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}
.patient-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.patient-card:hover { border-color: var(--border2); background: var(--surface2); }

.card-num {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--muted2); min-width: 32px; text-align: center;
}
.card-num.first { color: var(--accent); }

.card-avatar {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}

.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

.card-badge {
  font-size: 11px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; white-space: nowrap;
}

.card-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover.del { border-color: rgba(248,113,113,0.4); color: var(--danger); background: rgba(248,113,113,0.08); }

/* Node Diagram */
.node-diagram {
  padding: 0 24px 16px; overflow-x: auto;
  display: none;
}
.node-diagram.visible { display: block; }
.node-diagram-inner {
  display: flex; align-items: center; gap: 0;
  min-width: max-content; padding: 8px 0;
}
.dia-null {
  font-family: var(--mono); font-size: 11px; color: var(--muted2);
  padding: 6px 8px; border: 1px dashed var(--border2); border-radius: 6px;
}
.dia-node {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 8px 10px; text-align: center;
  min-width: 80px; font-size: 11px;
}
.dia-node.head-node { border-color: var(--accent); }
.dia-node .dia-icon { font-size: 16px; }
.dia-node .dia-name { color: var(--text); font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }
.dia-node .dia-ptr  { font-family: var(--mono); font-size: 9px; color: var(--muted2); margin-top: 4px; }
.dia-arrow {
  display: flex; flex-direction: column; align-items: center;
  font-size: 10px; color: var(--muted2); padding: 0 4px; flex-shrink: 0;
}

/* Responsive tweaks */
@media (max-width: 900px) {
  main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .panel-left { border-right: none; border-bottom: 1px solid var(--border2); max-height: 55vh; overflow-y: auto; }
}
</style>
</head>
<body>
<div class="app">

<!-- ── Header ── -->
<header>
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div>
      <div class="logo-text">Hospital DoubleLink</div>
      <div class="logo-sub">Lista Doblemente Enlazada · POO · Python</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge-live"><span class="dot-live"></span>Sistema activo</div>
  </div>
</header>

<main>
<!-- ── Left Panel ── -->
<aside class="panel-left">
  <div class="panel-section" style="padding-top:18px">
    <div class="section-title">Resumen</div>
    <div class="stats-row">
      <div class="stat-card"><div class="val" id="statTotal">0</div><div class="lbl">En espera</div></div>
      <div class="stat-card"><div class="val" id="statUrgentes">0</div><div class="lbl">Urgencias</div></div>
      <div class="stat-card"><div class="val" id="statAtendidos">0</div><div class="lbl">Atendidos</div></div>
    </div>
  </div>

  <div class="divider" style="margin:0 20px"></div>

  <!-- Form -->
  <div class="panel-section" style="flex:1;overflow-y:auto;padding-bottom:16px">
    <div class="section-title">Registrar paciente</div>
    <div class="form-grid">
      <div>
        <label>Nombre completo</label>
        <input id="fNombre" type="text" placeholder="Ej: Juan Pérez">
      </div>
      <div>
        <label>Número de cédula</label>
        <input id="fCedula" type="text" placeholder="Ej: 1005123456">
      </div>
      <div class="form-row">
        <div>
          <label>Especialidad</label>
          <select id="fEspecialidad">
            <option value="medicina">🩺 Medicina</option>
            <option value="cardiologia">❤️ Cardiología</option>
            <option value="pediatria">👶 Pediatría</option>
            <option value="odontologia">🦷 Odontología</option>
            <option value="urgencias">🚨 Urgencias</option>
          </select>
        </div>
        <div>
          <label>Edad</label>
          <input id="fEdad" type="number" placeholder="Años" min="0" max="120">
        </div>
      </div>
      <label class="urgente-toggle" id="urgenteToggle">
        <input type="checkbox" id="fUrgente">
        <div class="toggle-dot"></div>
        <div>
          <div class="toggle-label">Prioridad urgente</div>
          <div class="toggle-sub">Se inserta al inicio de la cola</div>
        </div>
      </label>
      <button class="btn btn-primary" onclick="registrarPaciente()">+ Registrar paciente</button>
    </div>

    <div class="divider"></div>

    <!-- Atender -->
    <div class="section-title">Acciones de cola</div>
    <div class="btn-group">
      <button class="btn btn-danger" onclick="atenderSiguiente()" style="flex:1">
        ✓ Atender siguiente
      </button>
    </div>

    <div class="divider"></div>

    <!-- Búsqueda -->
    <div class="section-title">Buscar paciente</div>
    <div class="search-box">
      <input id="bCedula" type="text" placeholder="Cédula del paciente...">
      <button onclick="buscarPaciente()">🔍</button>
    </div>
    <div class="search-result" id="searchResult"></div>
  </div>
</aside>

<!-- ── Right Panel ── -->
<section class="panel-right">
  <div class="queue-header">
    <div>
      <div class="queue-title">Cola de espera</div>
      <div class="queue-meta" id="queueMeta">Cargando...</div>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnListView" onclick="setView('list')">Lista</button>
      <button class="view-btn" id="btnDiaView"  onclick="setView('dia')">Diagrama</button>
    </div>
  </div>

  <!-- Node Diagram -->
  <div class="node-diagram" id="nodeDiagram"></div>

  <!-- Patient List -->
  <div class="queue-scroll" id="queueList">
    <div class="queue-empty">
      <div class="empty-icon">⏳</div>
      <p>Cargando pacientes...</p>
    </div>
  </div>
</section>
</main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
let atendidosCount = 0;
let currentView = 'list';

// ── Helpers ──────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3200);
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function setView(v) {
  currentView = v;
  document.getElementById('btnListView').className = 'view-btn' + (v==='list'?' active':'');
  document.getElementById('btnDiaView').className  = 'view-btn' + (v==='dia' ?' active':'');
  document.getElementById('nodeDiagram').className = 'node-diagram' + (v==='dia'?' visible':'');
  document.getElementById('queueList').style.display = v==='list'?'':'none';
}

// ── API calls ────────────────────────────────────────────────
async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}

// ── Render ───────────────────────────────────────────────────
function renderList(pacientes) {
  const el = document.getElementById('queueList');
  if (!pacientes.length) {
    el.innerHTML = `<div class="queue-empty"><div class="empty-icon">🎉</div><p>No hay pacientes en espera</p></div>`;
    return;
  }
  el.innerHTML = pacientes.map((p, i) => `
    <div class="patient-card" style="border-left-color:${p.color};border-left-width:3px">
      <div class="card-num ${i===0?'first':'}">#${String(p.turno).padStart(3,'0')}</div>
      <div class="card-avatar" style="background:${hexToRgba(p.color,0.15)}">${p.icono}</div>
      <div class="card-info">
        <div class="card-name">${p.nombre}</div>
        <div class="card-meta">Cédula: ${p.cedula} &nbsp;·&nbsp; Edad: ${p.edad} años</div>
      </div>
      <span class="card-badge" style="background:${hexToRgba(p.color,0.15)};color:${p.color}">${p.especialidad}</span>
      <div class="card-actions">
        <button class="icon-btn del" title="Eliminar" onclick="eliminarPaciente('${p.cedula}')">✕</button>
      </div>
    </div>
  `).join('');
}

function renderDiagram(pacientes) {
  const el = document.getElementById('nodeDiagram');
  if (!pacientes.length) { el.innerHTML=''; return; }

  let html = '<div class="node-diagram-inner">';
  html += '<span class="dia-null">NULL</span>';

  pacientes.forEach((p, i) => {
    html += `
      <div class="dia-arrow"><span>←</span><span>→</span></div>
      <div class="dia-node ${i===0?'head-node':''}">
        <div class="dia-icon">${p.icono}</div>
        <div class="dia-name">${p.nombre.split(' ')[0]}</div>
        <div class="dia-ptr">prev | next</div>
      </div>
    `;
  });

  html += '<div class="dia-arrow"><span>←</span><span>→</span></div>';
  html += '<span class="dia-null">NULL</span>';
  html += '</div>';
  el.innerHTML = html;
}

function updateStats(pacientes) {
  const urgentes = pacientes.filter(p => p.especialidad.toLowerCase() === 'urgencias').length;
  document.getElementById('statTotal').textContent    = pacientes.length;
  document.getElementById('statUrgentes').textContent = urgentes;
  document.getElementById('statAtendidos').textContent = atendidosCount;
  document.getElementById('queueMeta').textContent =
    `${pacientes.length} paciente${pacientes.length!==1?'s':''} · cabeza → cola`;
}

async function refresh() {
  const data = await api('/api/pacientes');
  const pacientes = data.pacientes || [];
  renderList(pacientes);
  renderDiagram(pacientes);
  updateStats(pacientes);
}

// ── Acciones ─────────────────────────────────────────────────
async function registrarPaciente() {
  const nombre      = document.getElementById('fNombre').value.trim();
  const cedula      = document.getElementById('fCedula').value.trim();
  const especialidad = document.getElementById('fEspecialidad').value;
  const edad        = parseInt(document.getElementById('fEdad').value) || 0;
  const urgente     = document.getElementById('fUrgente').checked;

  if (!nombre || !cedula) { toast('Completa nombre y cédula', 'err'); return; }
  if (!edad || edad < 1)  { toast('Ingresa una edad válida', 'err'); return; }

  const res = await api('/api/pacientes', 'POST', {nombre, cedula, especialidad, edad, urgente});
  if (res.error) { toast(res.error, 'err'); return; }

  toast(`Paciente ${nombre} registrado — Turno #${String(res.paciente.turno).padStart(3,'0')}`, 'ok');
  document.getElementById('fNombre').value = '';
  document.getElementById('fCedula').value = '';
  document.getElementById('fEdad').value   = '';
  await refresh();
}

async function atenderSiguiente() {
  const res = await api('/api/atender', 'DELETE');
  if (res.error) { toast(res.error, 'err'); return; }
  atendidosCount++;
  toast(`✓ Atendido: ${res.paciente.nombre} (${res.paciente.especialidad})`, 'ok');
  await refresh();
}

async function eliminarPaciente(cedula) {
  if (!confirm('¿Eliminar este paciente de la cola?')) return;
  const res = await api(`/api/pacientes/${cedula}`, 'DELETE');
  if (res.error) { toast(res.error, 'err'); return; }
  toast(`Paciente ${res.paciente.nombre} eliminado`, 'info');
  await refresh();
}

async function buscarPaciente() {
  const cedula = document.getElementById('bCedula').value.trim();
  if (!cedula) { toast('Ingresa una cédula', 'err'); return; }
  const res = await api(`/api/buscar/${cedula}`);
  const el  = document.getElementById('searchResult');
  if (res.error) {
    el.className = 'search-result visible';
    el.innerHTML = `<span style="color:var(--danger)">✕ ${res.error}</span>`;
  } else {
    const p = res.paciente;
    el.className = 'search-result visible';
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${p.icono}</span>
        <div>
          <div style="font-weight:500">${p.nombre}</div>
          <div style="font-size:11px;color:var(--muted)">${p.especialidad} · ${p.edad} años · Turno #${String(p.turno).padStart(3,'0')}</div>
        </div>
      </div>`;
  }
}

// Urgente toggle
document.getElementById('urgenteToggle').addEventListener('click', function() {
  const cb = document.getElementById('fUrgente');
  cb.checked = !cb.checked;
  this.classList.toggle('active', cb.checked);
});

// Enter en búsqueda
document.getElementById('bCedula').addEventListener('keydown', e => {
  if (e.key === 'Enter') buscarPaciente();
});

// Enter en formulario
['fNombre','fCedula','fEdad'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') registrarPaciente();
  });
});

// Auto-refresh cada 10s
setInterval(refresh, 10000);

// Inicial
refresh();
</script>
</body>
</html>
